services:
  - type: keyvalue
    name: chatbot-redis
    plan: free
    ipAllowList: []

  - type: web
    name: chatbot-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: chatbot-backend
          type: pserv
          property: host
      - key: BACKEND_PORT
        fromService:
          name: chatbot-backend
          type: pserv
          property: port

  - type: pserv
    name: chatbot-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # ── API Keys (PHẢI nhập thủ công trên Render Dashboard) ──
      - key: GEMINI_API_KEY
        sync: false          # Bắt buộc — Google AI Studio
      - key: GEMINI_API_KEYS
        sync: false          # Tuỳ chọn — nhiều key cách nhau bằng dấu phẩy
      - key: TAVILY_API_KEY
        sync: false          # Bắt buộc nếu bật web search
      # ── Bảo mật ──────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true  # Render tự sinh
      - key: SESSION_HMAC_KEY
        generateValue: true  # Render tự sinh — mã hoá session_key trong DB
      # ── Admin ────────────────────────────────────────────────
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false          # Nhập thủ công — đặt mật khẩu mạnh
      # ── Database & Cache ─────────────────────────────────────
      - key: DATABASE_URL_RAW
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: REDIS_URL_RAW
        fromService:
          name: chatbot-redis
          type: keyvalue
          property: connectionString
      # ── App config ───────────────────────────────────────────
      - key: PORT
        value: "8000"
      - key: UVICORN_WORKERS
        value: "2"
      - key: DEBUG
        value: "false"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: "8192"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "120"
      - key: RETRIEVAL_TOP_K
        value: "5"
      - key: RETRIEVAL_SCORE_THRESHOLD
        value: "0.30"
      - key: CORS_ORIGINS
        value: '["https://chatbot-frontend.onrender.com"]'

  - type: worker
    name: chatbot-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: celery -A app.tasks.ingest.celery_app worker --loglevel=info --concurrency=2 -Q celery
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SESSION_HMAC_KEY
        sync: false
      - key: DATABASE_URL_RAW
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: REDIS_URL_RAW
        fromService:
          name: chatbot-redis
          type: keyvalue
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: "8192"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "120"
      - key: RETRIEVAL_TOP_K
        value: "5"
      - key: RETRIEVAL_SCORE_THRESHOLD
        value: "0.30"

databases:
  - name: chatbot-db
    plan: free
    databaseName: chatbot
    user: chatbot

