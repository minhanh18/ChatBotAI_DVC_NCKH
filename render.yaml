services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: keyvalue
    name: chatbot-redis
    plan: free
    ipAllowList: []

  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: chatbot-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HMAC_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL_RAW
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: REDIS_URL_RAW
        fromService:
          name: chatbot-redis
          type: keyvalue
          property: connectionString
      - key: PORT
        value: "8000"
      - key: UVICORN_WORKERS
        value: "1"
      - key: DEBUG
        value: "false"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: "8192"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "120"
      - key: RETRIEVAL_TOP_K
        value: "5"
      - key: RETRIEVAL_SCORE_THRESHOLD
        value: "0.30"
      - key: CORS_ORIGINS
        value: '["https://chatbot-frontend-oymx.onrender.com","http://localhost","http://localhost:3000"]'

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: chatbot-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: BACKEND_HOST
        value: chatbot-backend-qhsy.onrender.com

databases:
  - name: chatbot-db
    plan: free
    databaseName: chatbot
    user: chatbot
